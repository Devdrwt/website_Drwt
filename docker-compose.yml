# Production stack for the Hostinger VPS.
#   db    — MySQL 8 (data persisted in a named volume)
#   app   — Next.js standalone server (image built & pushed by GitHub Actions)
#   caddy — reverse proxy with automatic HTTPS (Let's Encrypt)
#
# Configure values in a `.env` file next to this one (see .env.production.example).

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks: [web]

  app:
    image: ${APP_IMAGE:-ghcr.io/devdrwt/website_drwt:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_WHATSAPP: ${NEXT_PUBLIC_WHATSAPP}
      NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL}
      NEXT_PUBLIC_PHONE: ${NEXT_PUBLIC_PHONE}
    volumes:
      # Persist authenticated file uploads across redeploys.
      - uploads:/app/private/uploads
    expose:
      - "3000"
    networks: [web]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]

volumes:
  db_data:
  uploads:
  caddy_data:
  caddy_config:

networks:
  web:
