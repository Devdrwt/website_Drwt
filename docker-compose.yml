# Production stack for the Hostinger VPS (Webuzo + nginx front).
#   db  — MySQL 8 (data persisted in a named volume, internal network only)
#   app — Next.js standalone server, bound to 127.0.0.1:3000
#
# The host already runs nginx (Webuzo) on ports 80/443. nginx reverse-proxies
# the site's subdomain to 127.0.0.1:3000 and terminates TLS, so this stack does
# NOT publish 80/443 itself. Configure values in a `.env` next to this file
# (see .env.production.example).

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks: [web]

  app:
    image: ${APP_IMAGE:-ghcr.io/devdrwt/website_drwt:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_WHATSAPP: ${NEXT_PUBLIC_WHATSAPP}
      NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL}
      NEXT_PUBLIC_PHONE: ${NEXT_PUBLIC_PHONE}
    volumes:
      # Persist authenticated file uploads across redeploys.
      - uploads:/app/private/uploads
    ports:
      # Listen on loopback only — the host's nginx proxies to this.
      - "127.0.0.1:3000:3000"
    networks: [web]

volumes:
  db_data:
  uploads:

networks:
  web:
